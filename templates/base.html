<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCanteen Lab</title>
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body class="theme-{{ request.session.theme|default:'classic' }}">
<div class="topbar">
    <div class="topbar-inner">
        <a class="brand" href="/">
            <span class="brand-badge">SC</span>
            <span>SmartCanteen</span>
        </a>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/menu/">Menu</a>
            <a href="/order/new/">Place Order</a>
            <a href="/orders/">My Orders</a>
            <a href="/feedback/new/">Feedback</a>
            <a href="/api/health/">API Health</a>
            {% if user.is_authenticated %}
                <form action="/accounts/logout/" method="post" class="inline-form">
                    {% csrf_token %}
                    <button type="submit" class="nav-button">Logout ({{ user.username }})</button>
                </form>
            {% else %}
                <a href="/accounts/login/">Login</a>
                <a href="/register/">Register</a>
            {% endif %}
        </div>
    </div>
</div>
<div class="container">
    {% for message in messages %}
        <div class="msg">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
</div>
</body>
</html>
